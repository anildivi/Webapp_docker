```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docker Web Application</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            color: #333;
        }

        p {
            color: #666;
            font-size: 18px;
        }

        .btn {
            margin-top: 20px;
            padding: 12px 20px;
            border: none;
            background: #0078ff;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn:hover {
            background: #005edb;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Welcome to My Dockerized Web App</h1>

        <p>
            This web application is running inside a Docker container.
        </p>

        <button class="btn" onclick="showMessage()">
            Click Me
        </button>

        <p id="message"></p>
    </div>

    <script>
        function showMessage() {
            document.getElementById("message").innerHTML =
                "Docker Container is Working Successfully!";
        }
    </script>

</body>
</html>
```
